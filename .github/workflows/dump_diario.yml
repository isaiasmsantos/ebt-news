name: Dump Diario Embratur

# Define quando o script vai rodar
on:
  schedule:
    # Roda todos os dias às 08:00 (Horário de Brasília) / 11:00 UTC
    - cron: '0 11 * * *' 
  workflow_dispatch: # Permite rodar manualmente clicando em um botão

# Permissões para o robô salvar os txt gerados no seu repositório
permissions:
  contents: write

jobs:
  extrair_noticias:
    runs-on: ubuntu-latest
    
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar as bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar o script Python
        run: python ebt_news_git.py

      - name: Salvar os arquivos TXT gerados no GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Avisa o Git para olhar para a pasta ebt_news
          git add ebt_news/
          
          # Só faz o commit se houver novidades
          git diff-index --quiet HEAD || git commit -m "Rotina diária: Atualiza dump e histórico de notícias [skip ci]"
          
          git push
